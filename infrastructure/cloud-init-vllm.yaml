#cloud-config
# Scaleway Medical AI Lab — Voxtral Realtime vLLM Server
# Installs Docker + NVIDIA Container Toolkit, pulls and runs vLLM
# with the Voxtral Mini 4B Realtime model on the L4 GPU.

package_update: true

packages:
  - curl
  - jq

write_files:
  - path: /opt/vllm/docker-compose.yaml
    permissions: "0644"
    content: |
      services:
        vllm:
          image: vllm/vllm-openai:latest
          runtime: nvidia
          ports:
            - "8000:8000"
          volumes:
            - hf-cache:/root/.cache/huggingface
          environment:
            - NVIDIA_VISIBLE_DEVICES=all
          entrypoint: ["/bin/bash", "-c"]
          command:
            - |
              pip install soundfile soxr &&
              python3 -m vllm.entrypoints.openai.api_server \
                --model mistralai/Voxtral-Mini-4B-Realtime-2602 \
                --host 0.0.0.0 \
                --port 8000 \
                --tokenizer-mode mistral \
                --config-format mistral \
                --load-format mistral \
                --trust-remote-code \
                --compilation-config='{"cudagraph_mode":"PIECEWISE"}' \
                --max-model-len 4096 \
                --max-num-batched-tokens 8192 \
                --max-num-seqs 16 \
                --gpu-memory-utilization 0.90
          restart: unless-stopped
          deploy:
            resources:
              reservations:
                devices:
                  - driver: nvidia
                    count: 1
                    capabilities: [gpu]
      volumes:
        hf-cache:

  - path: /opt/vllm/start.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
      cd /opt/vllm
      echo "Starting vLLM with Voxtral Realtime..."
      docker compose up -d
      echo "vLLM starting — model download may take 10-15 minutes on first boot."
      echo "Check status: docker compose -f /opt/vllm/docker-compose.yaml logs -f"

runcmd:
  # NVIDIA Container Toolkit is pre-installed on gpu_os images,
  # but ensure Docker can use it
  - systemctl enable docker
  - systemctl start docker
  - nvidia-smi  # verify GPU is visible
  # Start vLLM
  - /opt/vllm/start.sh
